name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install clang-format
      run: sudo apt-get update && sudo apt-get install -y clang-format
    - name: Run format check
      run: |
        find src -name "*.cpp" -o -name "*.h" | xargs clang-format --dry-run --Werror

  abc-lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Lint .abc files
      run: |
        chmod +x tools/abc_lint.sh
        bash tools/abc_lint.sh stdlib/*.abc tests/golden_files/*.abc test.abc

  build:
    needs: [format-check, abc-lint]
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    - name: Configure
      run: cmake -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON -S . -B build
    - name: Build
      run: cmake --build build --config Release
    - name: Test
      shell: bash
      run: |
        cd build
        ctest -C Release --output-on-failure

  asan:
    needs: [format-check, abc-lint]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Configure with ASan
      run: cmake -DCMAKE_BUILD_TYPE=Debug -DENABLE_ASAN=ON -DBUILD_TESTS=ON -S . -B build
    - name: Build
      run: cmake --build build -j$(nproc)
    - name: Test with ASan
      run: |
        cd build
        ctest --output-on-failure
