name: Build Release

on:
  release:
    types: [created]
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-amd64
            artifact: alphabet
            build_path: build
            generator: "DEB;TGZ"
          - os: macos-latest
            target: macos-amd64
            artifact: alphabet
            build_path: build
            extra_flags: -DCMAKE_OSX_ARCHITECTURES=x86_64
            generator: "DragNDrop;TGZ"
          - os: macos-latest
            target: macos-arm64
            artifact: alphabet
            build_path: build
            extra_flags: -DCMAKE_OSX_ARCHITECTURES=arm64
            generator: "DragNDrop;TGZ"
          - os: windows-latest
            target: windows-amd64
            artifact: alphabet.exe
            build_path: build/Release
            generator: "ZIP"

    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release ${{ matrix.extra_flags }}

      - name: Build
        run: cmake --build build --config Release --target alphabet

      - name: Strip (Unix)
        if: runner.os != 'Windows'
        run: strip ${{ matrix.build_path }}/${{ matrix.artifact }}

      - name: Package
        shell: bash
        run: |
          cd build
          cpack -G "${{ matrix.generator }}" -C Release

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')
        with:
          files: |
            build/alphabet-*.*
          fail_on_unmatched_files: false
