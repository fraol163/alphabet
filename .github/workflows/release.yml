name: Build Release

on:
  release:
    types: [created]
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            generator: "DEB;TGZ"
            artifact: "alphabet-*.deb"
          - os: macos-latest
            target: macos
            generator: "DragNDrop;TGZ"
            artifact: "alphabet-*.dmg"
          - os: windows-latest
            target: windows
            generator: "NSIS;ZIP"
            artifact: "alphabet-*-win64.exe"

    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        shell: bash
        run: |
          cd build
          cpack -G ${{ matrix.generator }}

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: build/${{ matrix.artifact }}
