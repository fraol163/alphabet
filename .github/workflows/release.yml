name: Build Release

on:
  release:
    types: [created]
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-amd64
            artifact: alphabet
          - os: macos-latest
            target: macos-amd64
            artifact: alphabet
          - os: macos-latest
            target: macos-arm64
            artifact: alphabet
            extra_flags: -DCMAKE_OSX_ARCHITECTURES=arm64
          - os: windows-latest
            target: windows-amd64
            artifact: alphabet.exe

    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release ${{ matrix.extra_flags }}

      - name: Build
        run: cmake --build build --config Release --target alphabet

      - name: Strip (Unix)
        if: runner.os != 'Windows'
        run: strip build/${{ matrix.artifact }}

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: build/${{ matrix.artifact }}
          asset_name: alphabet-${{ matrix.target }}${{ runner.os == 'Windows' && '.exe' || '' }}
