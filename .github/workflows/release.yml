name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: |
        cmake -DCMAKE_BUILD_TYPE=Release -S . -B build
        cmake --build build -j$(nproc)
        strip build/alphabet
    - name: Package
      run: cd build && tar czf alphabet-linux-amd64.tar.gz alphabet ../stdlib/ ../examples/
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: linux
        path: build/alphabet-linux-amd64.tar.gz

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: |
        cmake -DCMAKE_BUILD_TYPE=Release -S . -B build
        cmake --build build -j$(sysctl -n hw.ncpu)
        strip build/alphabet
    - name: Package
      run: cd build && tar czf alphabet-macos-arm64.tar.gz alphabet ../stdlib/ ../examples/
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: macos
        path: build/alphabet-macos-arm64.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: |
        cmake -DCMAKE_BUILD_TYPE=Release -S . -B build
        cmake --build build --config Release
    - name: Package
      run: |
        cd build/Release
        Compress-Archive -Path alphabet.exe,../../stdlib/,../../examples/ -DestinationPath alphabet-windows-amd64.zip
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: windows
        path: build/Release/alphabet-windows-amd64.zip

  release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Download artifacts
      uses: actions/download-artifact@v4
    - name: Create release
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
        files: |
          linux/alphabet-linux-amd64.tar.gz
          macos/alphabet-macos-arm64.tar.gz
          windows/alphabet-windows-amd64.zip
