  <path d="M 7 18 L 12 6 L 17 18 L 14.7 18 L 13.7 15.5 L 10.3 15.5 L 9.3 18 Z M 10.9 13.7 L 13.1 13.7 L 12 10.8 Z"
        fill="#ffffff"/>
</svg>
