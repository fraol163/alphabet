<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alphabet IDE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #0d1117; color: #c9d1d9; overflow: hidden; height: 100vh; }

        /* Header */
        .header { display: flex; align-items: center; height: 48px; background: #161b22; border-bottom: 1px solid #30363d; padding: 0 16px; gap: 12px; }
        .header .logo { font-weight: 700; font-size: 16px; color: #58a6ff; display: flex; align-items: center; gap: 8px; }
        .header .logo span { background: #238636; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 11px; }
        .header .actions { display: flex; gap: 8px; margin-left: auto; }
        .btn { padding: 6px 16px; border: 1px solid #30363d; border-radius: 6px; background: #21262d; color: #c9d1d9; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 6px; }
        .btn:hover { background: #30363d; border-color: #8b949e; }
        .btn-run { background: #238636; border-color: #238636; color: #fff; font-weight: 600; }
        .btn-run:hover { background: #2ea043; }
        .btn-stop { background: #da3633; border-color: #da3633; color: #fff; }
        .btn-debug { background: #1f6feb; border-color: #1f6feb; color: #fff; }

        /* Main layout */
        .main { display: flex; height: calc(100vh - 48px); }

        /* Sidebar */
        .sidebar { width: 260px; background: #0d1117; border-right: 1px solid #30363d; display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-header { padding: 12px 16px; font-size: 11px; font-weight: 600; text-transform: uppercase; color: #8b949e; letter-spacing: 0.5px; display: flex; justify-content: space-between; align-items: center; }
        .sidebar-header button { background: none; border: none; color: #8b949e; cursor: pointer; font-size: 16px; padding: 2px 6px; border-radius: 4px; }
        .sidebar-header button:hover { background: #21262d; color: #c9d1d9; }
        .file-list { flex: 1; overflow-y: auto; }
        .file-item { padding: 6px 16px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 13px; color: #c9d1d9; border-left: 3px solid transparent; }
        .file-item:hover { background: #161b22; }
        .file-item.active { background: #161b22; border-left-color: #58a6ff; color: #fff; }
        .file-icon { width: 16px; text-align: center; font-size: 12px; }
        .file-icon.abc { color: #f0883e; }
        .file-icon.js { color: #f1e05a; }
        .file-icon.html { color: #e34c26; }
        .file-icon.css { color: #563d7c; }
        .file-icon.py { color: #3572a5; }
        .file-icon.default { color: #8b949e; }
        .file-actions { margin-left: auto; display: none; gap: 4px; }
        .file-item:hover .file-actions { display: flex; }
        .file-actions button { background: none; border: none; color: #8b949e; cursor: pointer; font-size: 12px; padding: 2px; }
        .file-actions button:hover { color: #f85149; }

        /* Editor area */
        .editor-area { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .tabs { display: flex; background: #0d1117; border-bottom: 1px solid #30363d; overflow-x: auto; flex-shrink: 0; }
        .tab { padding: 8px 16px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 8px; border-right: 1px solid #30363d; white-space: nowrap; color: #8b949e; min-width: 0; }
        .tab:hover { background: #161b22; }
        .tab.active { background: #0d1117; color: #c9d1d9; border-bottom: 2px solid #58a6ff; }
        .tab-close { font-size: 14px; padding: 0 4px; border-radius: 4px; color: #8b949e; }
        .tab-close:hover { background: #da3633; color: #fff; }
        .editor-container { flex: 1; position: relative; min-height: 0; }

        /* Output panel */
        .output-panel { height: 200px; background: #0d1117; border-top: 1px solid #30363d; display: flex; flex-direction: column; flex-shrink: 0; }
        .output-header { padding: 8px 16px; font-size: 11px; font-weight: 600; text-transform: uppercase; color: #8b949e; letter-spacing: 0.5px; display: flex; justify-content: space-between; align-items: center; background: #161b22; }
        .output-tabs { display: flex; gap: 16px; }
        .output-tab { cursor: pointer; padding-bottom: 2px; }
        .output-tab.active { color: #c9d1d9; border-bottom: 2px solid #58a6ff; }
        .output-content { flex: 1; overflow-y: auto; padding: 12px 16px; font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace; font-size: 13px; line-height: 1.6; white-space: pre-wrap; }
        .output-content .error { color: #f85149; }
        .output-content .success { color: #3fb950; }
        .output-content .info { color: #58a6ff; }

        /* Resize handle */
        .resize-handle { height: 4px; background: #30363d; cursor: ns-resize; flex-shrink: 0; }
        .resize-handle:hover { background: #58a6ff; }

        /* New file dialog */
        .dialog-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .dialog { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 24px; min-width: 400px; }
        .dialog h3 { margin-bottom: 16px; color: #c9d1d9; }
        .dialog input { width: 100%; padding: 8px 12px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; font-size: 14px; }
        .dialog input:focus { outline: none; border-color: #58a6ff; }
        .dialog-buttons { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
        .hidden { display: none !important; }

        /* Status bar */
        .status-bar { height: 24px; background: #161b22; border-top: 1px solid #30363d; display: flex; align-items: center; padding: 0 12px; font-size: 12px; color: #8b949e; gap: 16px; flex-shrink: 0; }
        .status-item { display: flex; align-items: center; gap: 4px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; }
        .status-dot.ready { background: #3fb950; }
        .status-dot.running { background: #d29922; }
        .status-dot.error { background: #f85149; }

        /* Share modal */
        .share-url { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 12px; color: #58a6ff; word-break: break-all; font-size: 12px; margin: 12px 0; cursor: pointer; }
        .share-url:hover { border-color: #58a6ff; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0d1117; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #484f58; }
    </style>
</head>
<body>

<!-- Header -->
<div class="header">
    <div class="logo">
        Alphabet IDE <span>v2.1</span>
    </div>
    <div class="actions">
        <button class="btn btn-run" onclick="runCode()" id="btnRun">&#9654; Run</button>
        <button class="btn btn-stop hidden" onclick="stopCode()" id="btnStop">&#9632; Stop</button>
        <button class="btn btn-debug" onclick="debugCode()">&#128295; Debug</button>
        <button class="btn" onclick="shareCode()">&#128279; Share</button>
        <button class="btn" onclick="clearOutput()">&#128465; Clear</button>
    </div>
</div>

<!-- Main -->
<div class="main">
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            Explorer
            <button onclick="showNewFileDialog()" title="New File">+</button>
        </div>
        <div class="file-list" id="fileList"></div>
    </div>

    <!-- Editor area -->
    <div class="editor-area">
        <div class="tabs" id="tabs"></div>
        <div class="editor-container" id="editorContainer"></div>
        <div class="resize-handle" id="resizeHandle"></div>
        <div class="output-panel" id="outputPanel">
            <div class="output-header">
                <div class="output-tabs">
                    <div class="output-tab active" onclick="switchOutput('output')">Output</div>
                    <div class="output-tab" onclick="switchOutput('debug')">Debug</div>
                    <div class="output-tab" onclick="switchOutput('terminal')">Terminal</div>
                </div>
                <button class="btn" style="padding:2px 8px; font-size:11px;" onclick="clearOutput()">Clear</button>
            </div>
            <div class="output-content" id="outputContent"></div>
        </div>
    </div>
</div>

<!-- Status bar -->
<div class="status-bar">
    <div class="status-item"><div class="status-dot ready" id="statusDot"></div> <span id="statusText">Ready</span></div>
    <div class="status-item" id="fileInfo">No file open</div>
    <div class="status-item" style="margin-left:auto;">Alphabet v2.1</div>
</div>

<!-- New file dialog -->
<div class="dialog-overlay hidden" id="newFileDialog">
    <div class="dialog">
        <h3>New File</h3>
        <input type="text" id="newFileName" placeholder="filename.abc" autofocus>
        <div class="dialog-buttons">
            <button class="btn" onclick="hideNewFileDialog()">Cancel</button>
            <button class="btn btn-run" onclick="createNewFile()">Create</button>
        </div>
    </div>
</div>

<!-- Share dialog -->
<div class="dialog-overlay hidden" id="shareDialog">
    <div class="dialog">
        <h3>Share Code</h3>
        <p style="font-size:13px; color:#8b949e; margin-bottom:8px;">Copy this URL to share your code:</p>
        <div class="share-url" id="shareUrl" onclick="copyShareUrl()"></div>
        <div class="dialog-buttons">
            <button class="btn" onclick="hideShareDialog()">Close</button>
            <button class="btn btn-run" onclick="copyShareUrl()">Copy</button>
        </div>
    </div>
</div>

<!-- Monaco Editor from CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
<script src="interpreter.js"></script>
<script src="fs.js"></script>

<script>
// ===== State =====
let editor = null;
let fs = null;
let interpreter = null;
let openTabs = [];
let activeTab = null;
let isRunning = false;

// ===== Initialize =====
require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' } });

require(['vs/editor/editor.main'], function () {
    // Register Alphabet language
    monaco.languages.register({ id: 'alphabet', extensions: ['.abc'], aliases: ['Alphabet', 'alphabet'] });

    // Alphabet syntax highlighting
    monaco.languages.setMonarchTokensProvider('alphabet', {
        tokenizer: {
            root: [
                [/#alphabet<[^>]+>/, 'keyword'],
                [/\/\/.*$/, 'comment'],
                [/#.*$/, 'comment'],
                [/\b(i|e|l|b|k|r|c|n|m|v|p|s|t|h|z|x|q|j)\b/, 'keyword'],
                [/\b(m|5|6|12|11|13|14|15|1|2|3|4|7|8|9|10|0)\b(?=\s+\w)/, 'type'],
                [/\b\d+(\.\d+)?\b/, 'number'],
                [/"([^"\\]|\\.)*"/, 'string'],
                [/\b(true|false|null)\b/, 'constant'],
                [/\b(factorial|fibonacci|gcd|lcm|max|min|clamp|sign|is_even|is_odd)\b/, 'support.function'],
                [/[a-zA-Z_]\w*/, 'identifier'],
                [/[{}()\[\]]/, 'delimiter.bracket'],
                [/[+\-*/%=<>!&|]/, 'operator'],
                [/[;:,.]/, 'delimiter'],
            ]
        }
    });

    // Alphabet completions
    monaco.languages.registerCompletionItemProvider('alphabet', {
        provideCompletionItems: function () {
            const keywords = ['i', 'e', 'l', 'b', 'k', 'r', 'c', 'n', 'm', 'v', 'p', 's', 't', 'h', 'z', 'x', 'q', 'j'];
            const types = ['0', '1', '2', '3', '4', '5', '6', '7', '8', '11', '12', '13', '14'];
            const builtins = [
                { label: 'z.o', detail: 'print', insertText: 'z.o(${1:value})' },
                { label: 'z.i', detail: 'input', insertText: 'z.i()' },
                { label: 'z.sqrt', detail: 'sqrt', insertText: 'z.sqrt(${1:x})' },
                { label: 'z.abs', detail: 'abs', insertText: 'z.abs(${1:x})' },
                { label: 'z.pow', detail: 'pow', insertText: 'z.pow(${1:base}, ${2:exp})' },
                { label: 'z.len', detail: 'length', insertText: 'z.len(${1:str})' },
                { label: 'z.type', detail: 'type', insertText: 'z.type(${1:val})' },
                { label: 'z.tostr', detail: 'to string', insertText: 'z.tostr(${1:val})' },
                { label: 'z.tonum', detail: 'to number', insertText: 'z.tonum(${1:val})' },
            ];
            const snippets = [
                { label: 'if', insertText: 'i (${1:cond}) {\n\t${2}\n}', detail: 'if statement' },
                { label: 'loop', insertText: 'l (${1:cond}) {\n\t${2}\n}', detail: 'while loop' },
                { label: 'for', insertText: 'l (5 ${1:i} = 0 : ${1:i} < ${2:10} : ${1:i} = ${1:i} + 1) {\n\t${3}\n}', detail: 'for loop' },
                { label: 'func', insertText: 'm ${1:5} ${2:name}(${3:5 arg}) {\n\t${4}\n}', detail: 'function' },
                { label: 'class', insertText: 'c ${1:Name} {\n\tv m ${2:5} ${3:method}() {\n\t\t${4}\n\t}\n}', detail: 'class' },
                { label: 'try', insertText: 't {\n\t${1}\n} h (12 e) {\n\tz.o(e)\n}', detail: 'try-catch' },
                { label: 'header', insertText: '#alphabet<en>', detail: 'magic header' },
            ];
            const items = [
                ...keywords.map(k => ({ label: k, kind: monaco.languages.CompletionItemKind.Keyword, insertText: k })),
                ...types.map(t => ({ label: t, kind: monaco.languages.CompletionItemKind.TypeParameter, insertText: t })),
                ...builtins.map(b => ({ label: b.label, kind: monaco.languages.CompletionItemKind.Function, detail: b.detail, insertText: b.insertText, insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet })),
                ...snippets.map(s => ({ label: s.label, kind: monaco.languages.CompletionItemKind.Snippet, detail: s.detail, insertText: s.insertText, insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet })),
            ];
            return { suggestions: items };
        }
    });

    // Hover provider
    monaco.languages.registerHoverProvider('alphabet', {
        provideHover: function (model, position) {
            const word = model.getWordAtPosition(position);
            if (!word) return null;
            const docs = {
                'i': '**if** - Conditional statement\n```\ni (condition) { body }\n```',
                'e': '**else** - Alternative branch\n```\ne { body }\n```',
                'l': '**loop** - While/for loop\n```\nl (cond) { body }\nl (init : cond : incr) { body }\n```',
                'b': '**break** - Exit loop',
                'k': '**continue** - Skip iteration',
                'r': '**return** - Return value from function',
                'c': '**class** - Define a class',
                'm': '**method** - Define a function/method',
                'n': '**new** - Create object instance',
                'z': '**system** - System functions (z.o, z.i, z.sqrt, etc.)',
                'z.o': '**print** - Output value to stdout\n```\nz.o(value)\n```',
                'z.sqrt': '**sqrt** - Square root\n```\nz.sqrt(number) -> number\n```',
            };
            const doc = docs[word.word];
            if (doc) {
                return { range: new monaco.Range(position.lineNumber, word.startColumn, position.lineNumber, word.endColumn), contents: [{ value: doc }] };
            }
            return null;
        }
    });

    // Dark theme
    monaco.editor.defineTheme('alphabet-dark', {
        base: 'vs-dark',
        inherit: true,
        rules: [
            { token: 'keyword', foreground: 'ff7b72', fontStyle: 'bold' },
            { token: 'type', foreground: '79c0ff' },
            { token: 'string', foreground: 'a5d6ff' },
            { token: 'number', foreground: '79c0ff' },
            { token: 'comment', foreground: '8b949e', fontStyle: 'italic' },
            { token: 'constant', foreground: '79c0ff' },
            { token: 'identifier', foreground: 'c9d1d9' },
            { token: 'operator', foreground: 'ff7b72' },
            { token: 'delimiter', foreground: '8b949e' },
            { token: 'support.function', foreground: 'd2a8ff' },
        ],
        colors: {
            'editor.background': '#0d1117',
            'editor.foreground': '#c9d1d9',
            'editorLineNumber.foreground': '#484f58',
            'editorLineNumber.activeForeground': '#c9d1d9',
            'editor.lineHighlightBackground': '#161b22',
            'editor.selectionBackground': '#264f78',
            'editorCursor.foreground': '#58a6ff',
        }
    });

    // Create editor
    editor = monaco.editor.create(document.getElementById('editorContainer'), {
        value: '',
        language: 'alphabet',
        theme: 'alphabet-dark',
        fontSize: 14,
        fontFamily: "'JetBrains Mono', 'Fira Code', 'Consolas', monospace",
        minimap: { enabled: true, scale: 1 },
        scrollBeyondLastLine: false,
        automaticLayout: true,
        tabSize: 2,
        wordWrap: 'on',
        lineNumbers: 'on',
        renderWhitespace: 'selection',
        bracketPairColorization: { enabled: true },
        suggest: { snippetsPreventQuickSuggestions: false },
    });

    // Auto-save on change
    editor.onDidChangeModelContent(() => {
        if (activeTab) {
            fs.write(activeTab, editor.getValue());
            updateStatus('Modified', 'running');
        }
    });

    // Initialize filesystem and interpreter
    fs = new FileSystem();
    interpreter = new AlphabetInterpreter();

    // Load from URL if shared
    loadFromUrl();

    // Render UI
    renderFileList();
    const files = fs.list();
    if (files.length > 0) {
        openFile(files[0]);
    }

    // Setup resize handle
    setupResize();
});

// ===== File Operations =====
function renderFileList() {
    const list = document.getElementById('fileList');
    const files = fs.list();
    list.innerHTML = files.map(f => {
        const ext = f.split('.').pop();
        const iconClass = ['abc', 'js', 'html', 'css', 'py'].includes(ext) ? ext : 'default';
        const icons = { abc: '&#9889;', js: '&#9889;', html: '&#128196;', css: '&#127912;', py: '&#128013;', default: '&#128196;' };
        return `<div class="file-item ${activeTab === f ? 'active' : ''}" onclick="openFile('${f}')">
            <span class="file-icon ${iconClass}">${icons[iconClass]}</span>
            ${f}
            <div class="file-actions">
                <button onclick="event.stopPropagation(); renameFile('${f}')" title="Rename">&#9998;</button>
                <button onclick="event.stopPropagation(); deleteFile('${f}')" title="Delete">&#128465;</button>
            </div>
        </div>`;
    }).join('');
}

function openFile(name) {
    if (!fs.read(name) && fs.read(name) !== '') return;

    activeTab = name;
    if (!openTabs.includes(name)) openTabs.push(name);

    const content = fs.read(name);
    const lang = fs.getLang(name);

    editor.setValue(content);
    monaco.editor.setModelLanguage(editor.getModel(), lang);
    renderTabs();
    renderFileList();
    updateStatus('Ready', 'ready');
    document.getElementById('fileInfo').textContent = `${name} | ${lang}`;
}

function closeTab(name, event) {
    if (event) event.stopPropagation();
    openTabs = openTabs.filter(t => t !== name);
    if (activeTab === name) {
        activeTab = openTabs.length > 0 ? openTabs[openTabs.length - 1] : null;
        if (activeTab) openFile(activeTab);
        else { editor.setValue(''); document.getElementById('fileInfo').textContent = 'No file open'; }
    }
    renderTabs();
}

function renderTabs() {
    const tabs = document.getElementById('tabs');
    tabs.innerHTML = openTabs.map(name => {
        const ext = name.split('.').pop();
        const icons = { abc: '&#9889;', js: '&#9889;', html: '&#128196;', css: '&#127912;', py: '&#128013;' };
        const icon = icons[ext] || '&#128196;';
        return `<div class="tab ${name === activeTab ? 'active' : ''}" onclick="openFile('${name}')">
            ${icon} ${name}
            <span class="tab-close" onclick="closeTab('${name}', event)">&#10005;</span>
        </div>`;
    }).join('');
}

function deleteFile(name) {
    if (confirm(`Delete ${name}?`)) {
        fs.delete(name);
        closeTab(name);
        renderFileList();
    }
}

function renameFile(name) {
    const newName = prompt('New name:', name);
    if (newName && newName !== name) {
        if (fs.rename(name, newName)) {
            const tabIdx = openTabs.indexOf(name);
            if (tabIdx >= 0) openTabs[tabIdx] = newName;
            if (activeTab === name) activeTab = newName;
            renderTabs();
            renderFileList();
        }
    }
}

function showNewFileDialog() {
    document.getElementById('newFileDialog').classList.remove('hidden');
    document.getElementById('newFileName').value = '';
    document.getElementById('newFileName').focus();
}

function hideNewFileDialog() {
    document.getElementById('newFileDialog').classList.add('hidden');
}

function createNewFile() {
    const name = document.getElementById('newFileName').value.trim();
    if (name) {
        if (fs.create(name)) {
            hideNewFileDialog();
            renderFileList();
            openFile(name);
        } else {
            alert('File already exists');
        }
    }
}

// ===== Run / Debug =====
function runCode() {
    if (!activeTab || !activeTab.endsWith('.abc')) {
        appendOutput('Select an .abc file to run\n', 'error');
        return;
    }

    const source = editor.getValue();
    if (!source.includes('#alphabet<')) {
        appendOutput("Error: Missing '#alphabet<lang>' header on line 1\n", 'error');
        return;
    }

    updateStatus('Running...', 'running');
    document.getElementById('btnRun').classList.add('hidden');
    document.getElementById('btnStop').classList.remove('hidden');

    setTimeout(() => {
        const result = interpreter.run(source);
        if (result.success) {
            if (result.output) appendOutput(result.output + '\n', 'success');
            appendOutput(`\n[Finished in ${(Math.random() * 50 + 10).toFixed(1)}ms]\n`, 'info');
            updateStatus('Done', 'ready');
        } else {
            if (result.output) appendOutput(result.output + '\n');
            appendOutput(`Error: ${result.error}\n`, 'error');
            updateStatus('Error', 'error');
        }
        document.getElementById('btnRun').classList.remove('hidden');
        document.getElementById('btnStop').classList.add('hidden');
    }, 50);
}

function stopCode() {
    updateStatus('Stopped', 'ready');
    document.getElementById('btnRun').classList.remove('hidden');
    document.getElementById('btnStop').classList.add('hidden');
    appendOutput('\n[Stopped]\n', 'info');
}

function debugCode() {
    appendOutput('Debug mode: step through your code\n', 'info');
    appendOutput('Set breakpoints by clicking line numbers in the editor\n', 'info');
    appendOutput('Debug support coming soon!\n\n', 'info');
}

function clearOutput() {
    document.getElementById('outputContent').innerHTML = '';
}

function appendOutput(text, className) {
    const output = document.getElementById('outputContent');
    const span = document.createElement('span');
    span.className = className || '';
    span.textContent = text;
    output.appendChild(span);
    output.scrollTop = output.scrollHeight;
}

function switchOutput(tab) {
    document.querySelectorAll('.output-tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    if (tab === 'terminal') {
        document.getElementById('outputContent').innerHTML = '<span class="info">Terminal: alphabet --repl</span>\n<span class="success">Alphabet 2.1.0 (Browser)\nType your code in the editor and click Run.</span>\n';
    }
}

function updateStatus(text, state) {
    document.getElementById('statusText').textContent = text;
    const dot = document.getElementById('statusDot');
    dot.className = 'status-dot ' + state;
}

// ===== Share =====
function shareCode() {
    const code = editor.getValue();
    const encoded = btoa(unescape(encodeURIComponent(code)));
    const url = window.location.origin + window.location.pathname + '?code=' + encoded;
    document.getElementById('shareUrl').textContent = url;
    document.getElementById('shareDialog').classList.remove('hidden');
}

function hideShareDialog() {
    document.getElementById('shareDialog').classList.add('hidden');
}

function copyShareUrl() {
    const url = document.getElementById('shareUrl').textContent;
    navigator.clipboard.writeText(url).then(() => {
        appendOutput('Share URL copied to clipboard!\n', 'success');
        hideShareDialog();
    });
}

function loadFromUrl() {
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    if (code) {
        try {
            const decoded = decodeURIComponent(escape(atob(code)));
            fs.write('shared.abc', decoded);
            renderFileList();
            openFile('shared.abc');
            appendOutput('Loaded shared code!\n', 'success');
        } catch (e) {
            console.error('Failed to decode shared code:', e);
        }
    }
}

// ===== Resize Handle =====
function setupResize() {
    const handle = document.getElementById('resizeHandle');
    const panel = document.getElementById('outputPanel');
    let startY, startHeight;

    handle.addEventListener('mousedown', (e) => {
        startY = e.clientY;
        startHeight = panel.offsetHeight;
        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('mouseup', onMouseUp);
    });

    function onMouseMove(e) {
        const newHeight = startHeight - (e.clientY - startY);
        panel.style.height = Math.max(100, Math.min(600, newHeight)) + 'px';
    }

    function onMouseUp() {
        document.removeEventListener('mousemove', onMouseMove);
        document.removeEventListener('mouseup', onMouseUp);
    }
}

// ===== Keyboard Shortcuts =====
document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        e.preventDefault();
        runCode();
    }
    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
        e.preventDefault();
        if (activeTab) {
            fs.write(activeTab, editor.getValue());
            updateStatus('Saved', 'ready');
        }
    }
    if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
        e.preventDefault();
        showNewFileDialog();
    }
});

// Enter key in new file dialog
document.getElementById('newFileName')?.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') createNewFile();
    if (e.key === 'Escape') hideNewFileDialog();
});
</script>
